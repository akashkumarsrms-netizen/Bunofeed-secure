<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmed – Bunofeed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .success-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      background: var(--off-white);
    }
    .success-card {
      background: var(--white);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 16px 48px rgba(107,45,14,0.14);
    }
    .success-icon {
      width: 80px;height: 80px;border-radius: 50%;
      background: linear-gradient(135deg,#28a745,#20c753);
      display: flex;align-items: center;justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.2rem;color: #fff;
      box-shadow: 0 8px 24px rgba(40,167,69,.3);
    }
    .success-card h1 {
      font-family: var(--font-head);font-size: 1.7rem;font-weight: 800;
      color: var(--dark);margin-bottom: .5rem;
    }
    .success-card p { color: var(--gray);font-size: .97rem;line-height: 1.7;margin-bottom: .5rem; }
    .order-details {
      background: var(--off-white);border-radius: 12px;
      padding: 1.2rem 1.5rem;margin: 1.5rem 0;text-align: left;
    }
    .order-row {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: .7rem 0;
  border-bottom: 1px solid #f0e8e0;
}
.order-row:last-child { border-bottom: none; }

.order-row span:first-child {
  font-size: .75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--gray);
}

.order-row span:last-child {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: .92rem;
  color: var(--dark);
  word-break: break-all;
  overflow-wrap: anywhere;
  line-height: 1.45;
}
    .success-actions {
      display: flex;gap: .8rem;flex-wrap: wrap;justify-content: center;margin-top: 1.5rem;
    }
    .success-actions .btn { min-width: 140px; }
    @media(max-width:480px){
      .success-card{padding:2rem 1.2rem;}
      .success-actions .btn{flex:1;}
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <img src="https://bunofeed.in/images/logo2.png" alt="Bunofeed Logo" class="logo-img"/>
      </a>
    </div>
  </header>

  <div class="success-page">
    <div class="success-card">
      <div class="success-icon"><i class="fas fa-check"></i></div>
      <h1>Order Confirmed! 🎉</h1>
      <p>Thank you for your order. Your payment was successful.</p>
      <p>You'll receive a confirmation email shortly. We'll notify you once your order ships.</p>
      <p>Please retain your Order ID to track your shipment.</p>
      <div class="order-details" id="order-details">
        <div class="order-row"><span>Order ID</span><span id="order-id">—</span></div>
        <div class="order-row"><span>Payment ID</span><span id="pay-id">—</span></div>
        <div class="order-row"><span>Product</span><span id="pay-product">—</span></div>
        <div class="order-row"><span>Quantity</span><span id="pay-qty">—</span></div>
        <div class="order-row"><span>Amount Paid</span><span id="pay-total">—</span></div>
      </div>

      <div class="success-actions">
        <a href="shop.html"  class="btn btn-primary">Continue Shopping</a>
        <a href="orders.html" class="btn btn-brown">Track Order</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('order-id').textContent      = params.get('order_id') || '—';
    document.getElementById('pay-id').textContent      = params.get('payment_id') || '—';
    document.getElementById('pay-product').textContent = params.get('product')    || '—';
    document.getElementById('pay-qty').textContent     = params.get('qty')        || '—';
    const total = params.get('total');
    document.getElementById('pay-total').textContent   = total ? `₹${total}` : '—';
  </script>
</body>
</html>
